apiVersion: v1
kind: Service
metadata:
  name: {{ include "momentum.postgresName" . }}
  labels:
    {{- include "momentum.labels" . | nindent 4 }}
spec:
  # Headless: stable DNS for the single StatefulSet pod.
  clusterIP: None
  selector:
    {{- include "momentum.selectorLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: postgres
