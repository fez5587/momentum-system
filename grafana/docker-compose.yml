# Grafana for momentum — remote, visual monitoring over the Postgres event store.
#   cd grafana && docker compose up -d   ->   http://localhost:3000  (anonymous admin)
# The datasource + dashboard are auto-provisioned. The datasource points at the
# Postgres at 192.168.1.5:5432 (edit provisioning/datasources/momentum.yaml if needed).
services:
  grafana:
    image: grafana/grafana:11.2.0
    container_name: momentum-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=2s
    volumes:
      - ./provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
volumes:
  grafana-data:
